<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>미수금 조회 — 강원도개인소형화물협회</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #F5F6FA; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 40px 36px; width: 100%; max-width: 440px; }
  h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #6B7280; margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 6px; }
  input { width: 100%; height: 44px; padding: 0 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; color: #111827; outline: none; transition: border .15s; }
  input:focus { border-color: #3981F7; box-shadow: 0 0 0 3px rgba(57,129,247,.12); }
  .field { margin-bottom: 16px; }
  .btn { width: 100%; height: 46px; background: #3981F7; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 4px; }
  .btn:hover { background: #2563EB; }
  .btn:disabled { background: #93C5FD; cursor: not-allowed; }
  .result { margin-top: 24px; padding: 20px; background: #F0F7FF; border: 1px solid #BFDBFE; border-radius: 12px; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #DBEAFE; }
  .result-row:last-of-type { border-bottom: none; }
  .result-label { font-size: 12px; color: #4B5563; }
  .result-value { font-size: 14px; font-weight: 600; color: #111827; }
  .result-value.amount { color: #DC2626; font-size: 18px; }
  .notice { margin-top: 14px; font-size: 11px; color: #6B7280; line-height: 1.6; }
  .bank { margin-top: 10px; padding: 10px 14px; background: #ECFDF5; border: 1px solid #BBF7D0; border-radius: 8px; font-size: 13px; color: #065F46; font-weight: 600; }
  .error-msg { margin-top: 20px; padding: 14px 18px; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; font-size: 13px; color: #991B1B; line-height: 1.6; }
  .logo { display: block; text-align: center; font-size: 12px; color: #9CA3AF; margin-bottom: 24px; }
  .divider { height: 1px; background: #E5E7EB; margin: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">강원도개인소형화물협회</div>
  <h1>미수금 본인 조회</h1>
  <p class="sub">성명과 차량번호 뒷자리 4자리를 입력하세요.</p>

  <div class="field">
    <label for="name">성명</label>
    <input type="text" id="name" placeholder="홍길동" autocomplete="off" />
  </div>
  <div class="field">
    <label for="vno">차량번호 뒷자리 4자리 (숫자만)</label>
    <input type="text" id="vno" placeholder="1234" maxlength="4" inputmode="numeric" autocomplete="off" />
  </div>
  <button class="btn" id="submitBtn" onclick="doLookup()">조회하기</button>

  <div id="result" style="display:none;"></div>
</div>

<script>
async function doLookup() {
  const name = document.getElementById('name').value.trim();
  const vno  = document.getElementById('vno').value.replace(/\D/g,'').slice(-4);
  const btn  = document.getElementById('submitBtn');
  const out  = document.getElementById('result');

  if (!name) { alert('성명을 입력해 주세요.'); return; }
  if (vno.length < 4) { alert('차량번호 뒷자리 4자리를 입력해 주세요.'); return; }

  btn.disabled = true;
  btn.textContent = '조회 중...';
  out.style.display = 'none';

  try {
    const res = await fetch('/api/public/arrears-lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, vehicleLast4: vno }),
    });
    const data = await res.json();

    if (!data.found) {
      out.innerHTML = `<div class="error-msg">${escHtml(data.message || '입력하신 정보로 조회되는 내역이 없습니다. 정보가 맞는지 확인하시거나 협회로 문의해 주세요.')}</div>`;
    } else {
      const amt = data.arrearsAmount || 0;
      const rows = [
        ['성명', escHtml(data.name)],
        ['차량번호', escHtml(data.vehicleDisplay || '****')],
        ['현재 미수금', `<span class="result-value amount">${won(amt)}</span>`],
        ['미수 개월', `${data.arrearsMonths || 0}개월`],
        ['미납 항목', escHtml(data.unpaidItems || '—')],
      ];
      out.innerHTML = `
        <div class="result">
          ${rows.map(([l,v])=>`<div class="result-row"><span class="result-label">${l}</span><span class="result-value">${v}</span></div>`).join('')}
          <div class="bank">납부계좌: ${escHtml(data.bankAccount || '농협 281-01-137254')}</div>
          <p class="notice">${escHtml(data.notice || '')}</p>
        </div>`;
    }
    out.style.display = 'block';
  } catch(e) {
    out.innerHTML = `<div class="error-msg">조회 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</div>`;
    out.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '조회하기';
  }
}

function won(n) {
  return new Intl.NumberFormat('ko-KR', { style:'currency', currency:'KRW' }).format(n);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter 키 제출
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLookup();
});
</script>
</body>
</html>
